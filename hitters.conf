<VirtualHost *:80>
    ServerName hitters.datanalytics.pro
    ServerAlias www.hitters.datanalytics.pro

    Redirect permanent / https://hitters.datanalytics.pro/

    ErrorLog ${APACHE_LOG_DIR}/hitters_error.log
    CustomLog ${APACHE_LOG_DIR}/hitters_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName hitters.datanalytics.pro
    ServerAlias www.hitters.datanalytics.pro
    DocumentRoot /var/www/hitters

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/hitters.datanalytics.pro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/hitters.datanalytics.pro/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    WSGIDaemonProcess hitters python-home=/var/www/hitters/venv python-path=/var/www/hitters
    WSGIProcessGroup hitters
    WSGIScriptAlias / /var/www/hitters/hitters.wsgi

    <Directory /var/www/hitters>
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    Alias /static /var/www/hitters/static
    <Directory /var/www/hitters/static>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/hitters_error.log
    CustomLog ${APACHE_LOG_DIR}/hitters_access.log combined
</VirtualHost>
